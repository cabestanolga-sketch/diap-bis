<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="pannellum.css"/>
  <script src="pannellum.js"></script>
  <style>html, body, #panorama { width:100%; height:100vh; margin:0; }</style>
</head>
<body>
  <div id="panorama"></div>
  <script>
    pannellum.viewer('panorama', {
      default: {
        firstScene: 'scene1',
        sceneFadeDuration: 1000
      },
      scenes: {
        scene1: {
          title: 'vue du bar',
          panorama: '1.jpg',
          autoLoad: true,
	  hotSpotDebug: true,
          hotSpots: [
            {
              pitch: -6.14,
              yaw: -55.2,
              type: 'scene',
              sceneId: 'scene2',
              text: 'Aller pièce 2'
            }
          ]
        },
        scene2: {
          title: 'vue de la salle',
          panorama: '2.jpg',
          autoLoad: true,
	  hotSpotDebug: true,
          hotSpots: [
            {
              pitch: -7.3,
              yaw: 118.9,
              type: 'scene',
              sceneId: 'scene1',
              text: 'Retour pièce 1'
            }
          ]
        }
      }
    });
  </script>
</body>
</html>
